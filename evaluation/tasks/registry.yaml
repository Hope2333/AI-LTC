tasks:
  - id: repo_digest
    name: Repository digest
    description: "Read repository structure, README, and key governance docs to form an executable project-state summary."
    success_criteria:
      - identifies_core_dirs
      - detects_branch_semantics
      - distinguishes_stable_vs_experimental_assets
      - produces_actionable_summary
    preferred_roles:
      - architect
      - supervisor
    preferred_signals:
      - citation_quality
      - structure_accuracy
      - missing_risk_identification
    evidence_expectations:
      - repository_file_references
      - dated_branch_or_status_observations

  - id: bootstrap
    name: Bootstrap
    description: "Initialize a repo's AI-LTC operating surface and first lane state."
    success_criteria:
      - structure_is_consistent
      - handoff_is_possible
      - state_is_initialized
    preferred_roles:
      - architect
      - generalist
    preferred_signals:
      - diff_quality
      - constraint_following

  - id: daily_execution
    name: Daily execution
    description: "Normal implementation or maintenance work in an active lane."
    success_criteria:
      - lane_progress_is_real
      - blockers_are_recorded
    preferred_roles:
      - generalist
      - supervisor
    preferred_signals:
      - evidence_quality
      - scope_control

  - id: review_checkpoint
    name: Review checkpoint
    description: "Bounded verification or sequencing review before continuing."
    success_criteria:
      - next_action_is_clear
      - unresolved_risks_are_named
    preferred_roles:
      - supervisor
      - optimizer
    preferred_signals:
      - review_accuracy
      - blocker_detection

  - id: architecture_replan
    name: Architecture replan
    description: "Structural redesign or abstraction cleanup after drift is detected."
    success_criteria:
      - abstractions_are_clearer
      - migration_path_exists
    preferred_roles:
      - architect
      - strategist
    preferred_signals:
      - abstraction_quality
      - compatibility_preservation

  - id: tool_integration
    name: Tool integration
    description: "Integrate AI-LTC with an external runtime or tool platform."
    success_criteria:
      - boundary_is_clear
      - integration_path_is_actionable
    preferred_roles:
      - architect
      - generalist
    preferred_signals:
      - ownership_clarity
      - implementation_readiness

  - id: home_ai_consumer_framework
    name: Home AI consumer framework
    description: "Evaluate a local Home-level .ai runtime stack where AI-LTC governs policy and OML captures execution evidence."
    success_criteria:
      - home_risk_tiers_are_explicit
      - runtime_evidence_is_captured
      - sandbox_default_is_defined
      - direct_actuation_is_blocked_by_default
    preferred_roles:
      - architect
      - supervisor
    preferred_signals:
      - safety_boundary_clarity
      - evidence_quality
    evidence_expectations:
      - local_runtime_version_probe
      - runtime_help_or_doctor_output
      - oml_evidence_record
      - blocked_high_risk_case

  - id: repo_refactor
    name: Repository refactor
    description: "Restructure docs, prompts, or governance without changing the core protocol."
    success_criteria:
      - naming_is_clearer
      - compatibility_is_preserved
    preferred_roles:
      - generalist
      - strategist
    preferred_signals:
      - migration_clarity
      - regression_avoidance

  - id: narrow_audit
    name: Narrow audit
    description: "Investigate one focused technical risk or blocker without broadening scope."
    success_criteria:
      - the blocker is localized
      - evidence is concrete
    preferred_roles:
      - optimizer
      - supervisor
    preferred_signals:
      - blocker_localization
      - evidence_specificity

  - id: bug_fix
    name: Bug fix
    description: "Correct a concrete defect with the smallest verifiable change."
    success_criteria:
      - defect is reproduced or well-evidenced
      - fix is verified
    preferred_roles:
      - generalist
      - optimizer
    preferred_signals:
      - repro_quality
      - fix_verification
