name: Check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install validation dependencies
        run: python -m pip install PyYAML

      - name: Show validation environment
        run: |
          python --version
          make --version

      - name: Validate evaluation records
        run: make validate-evaluation

      - name: Validate prompt mapping
        run: make validate-prompts

      - name: Validate provider naming boundaries
        run: make validate-provider-naming

      - name: Validate TypeScript import links
        run: make validate-ts-imports

      - name: Validate config registry alignment
        run: make validate-config-registry

      - name: Run bridge smoke tests
        run: make test
